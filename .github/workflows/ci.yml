name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  UV_PYTHON: "3.12"

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest

      - name: Run ruff
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src tests
